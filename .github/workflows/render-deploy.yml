name: Deploy to Render

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trigger-render:
    name: Trigger Render Deploy Hook
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Skip when the only change is this workflow file itself, to avoid a
    # recursive loop on workflow edits.
    if: "!contains(github.event.head_commit.message, '[skip render]')"
    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "::error::RENDER_DEPLOY_HOOK secret is not set"
            exit 1
          fi
          echo "POSTing to $RENDER_DEPLOY_HOOK"
          HTTP_CODE=$(curl -sS -o /tmp/render.json -w "%{http_code}" \
            -X POST "$RENDER_DEPLOY_HOOK")
          echo "HTTP $HTTP_CODE"
          cat /tmp/render.json
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Render deploy hook failed (HTTP $HTTP_CODE)"
            exit 1
          fi
