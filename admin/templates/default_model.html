{% extends "layout.html" %}
{% block content %}
<h1>默认 LLM 模型配置</h1>
<p style="color:#888;font-size:13px;margin-bottom:20px;">
    配置全局默认模型模板。当管理员在租户详情页保存默认模型时，将基于此模板快速填充。
    租户注册时不会自动复制此模板（需在租户详情页单独配置）。
</p>

{% if error %}
<div class="alert alert-error">{{ error }}</div>
{% endif %}
{% if success %}
<div class="alert alert-success">{{ success }}</div>
{% endif %}

<form method="POST" action="/admin/default-model" class="form-card">
    <div class="form-group">
        <label>模型名称</label>
        <input type="text" name="name" value="{{ model.get('name', '') }}" placeholder="如：GPT-4o" required>
    </div>
    <div class="form-group">
        <label>模型类型</label>
        <select name="model_type">
            <option value="OPENAI" {{ 'selected' if model.get('model_type') == 'OPENAI' }}>OpenAI</option>
            <option value="CLAUDE" {{ 'selected' if model.get('model_type') == 'CLAUDE' }}>Claude</option>
            <option value="ZHIPU" {{ 'selected' if model.get('model_type') == 'ZHIPU' }}>智谱 GLM</option>
            <option value="TONGYI" {{ 'selected' if model.get('model_type') == 'TONGYI' }}>通义千问</option>
            <option value="CUSTOM" {{ 'selected' if model.get('model_type') == 'CUSTOM' }}>自定义</option>
        </select>
    </div>
    <div class="form-group">
        <label>模型 ID</label>
        <input type="text" name="model" value="{{ model.get('model', '') }}" placeholder="如：gpt-4o" required>
    </div>
    <div class="form-group">
        <label>API Key</label>
        <input type="password" name="api_key" value="{{ model.get('api_key', '') }}" placeholder="sk-...">
    </div>
    <div class="form-group">
        <label>API 端点（可选）</label>
        <input type="text" name="api_endpoint" value="{{ model.get('api_endpoint', '') }}" placeholder="留空使用默认">
    </div>
    <div class="form-group">
        <label>Temperature</label>
        <input type="number" name="temperature" value="{{ model.get('temperature', 0.7) }}" step="0.1" min="0" max="2">
    </div>
    <div class="form-group">
        <label>Max Tokens</label>
        <input type="number" name="max_tokens" value="{{ model.get('max_tokens', 2000) }}" min="1" max="32000">
    </div>
    <div class="form-group">
        <label>
            <input type="checkbox" name="enabled" {{ 'checked' if model.get('enabled', 1) }}> 启用
        </label>
    </div>
    <button type="submit" class="btn btn-primary">保存全局默认</button>
</form>

<h2 style="margin-top:32px;">快速应用到租户</h2>
<p style="color:#888;font-size:13px;margin-bottom:16px;">
    将当前全局默认模型快速应用到指定租户（覆盖已有配置）。
</p>
<form method="POST" action="/admin/default-model" class="form-card" style="max-width:480px;">
    <input type="hidden" name="action" value="apply_to_tenant">
    <div class="form-group">
        <label>租户 ID</label>
        <input type="text" name="tenant_id" placeholder="输入租户 UUID" required>
    </div>
    <button type="submit" class="btn btn-success">应用到租户</button>
</form>
{% endblock %}
