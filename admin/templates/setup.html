{% extends "layout.html" %}
{% block content %}
<div class="login-container" style="max-width:420px;margin:80px auto;">
    <h2>🔧 首次使用 — 创建管理员账户</h2>
    <p style="color:#666;margin-bottom:20px;">系统中还没有管理员账户，请创建一个：</p>
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/admin/setup">
        <div class="form-group">
            <label>管理员手机号</label>
            <input type="tel" name="phone" value="13800138000" placeholder="请输入手机号" required>
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" name="password" placeholder="至少6位" required>
        </div>
        <div class="form-group">
            <label>确认密码</label>
            <input type="password" name="confirm_password" placeholder="再次输入密码" required>
        </div>
        <button type="submit" class="btn btn-primary">创建管理员账户</button>
    </form>
    <p style="margin-top:15px;font-size:0.85em;color:#999;">创建后请使用手机号和密码登录</p>
</div>
{% endblock %}
