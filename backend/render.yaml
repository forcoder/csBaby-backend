services:
  - type: web
    name: csbaby-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:application --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: DATABASE_PATH
        value: /var/data/csBaby.db
      - key: JWT_SECRET
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11"
    disk:
      - name: data
        mountPath: /var/data
        sizeGB: 1
