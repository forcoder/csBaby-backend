services:
  - type: web
    name: csbaby-sync-server
    runtime: python
    plan: starter
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "app:app" --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    region: oregon
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
      - key: ADMIN_PHONE
        value: "13800138000"
      - key: ADMIN_PASSWORD
        value: "admin123"
      - key: PYTHON_VERSION
        value: "3.11"
      # PostgreSQL connection string (configure in Render Dashboard → Environment).
      # Leave sync: false so the value is not committed to git.
      - key: DATABASE_URL
        sync: false